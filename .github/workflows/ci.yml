name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Run tests
        run: |
          mkdir -p .pytest_basetemp
          uv run --extra test pytest --basetemp .pytest_basetemp/ci -q

      - name: Build wheel
        run: uv build
