# sim-cli — MATLAB driver compatibility matrix.
#
# MATLAB has a Python binding (`matlabengine`) but it is rigidly coupled to
# the MATLAB binary version: matlabengine 24.1 ONLY talks to MATLAB R2024a,
# matlabengine 24.2 ONLY talks to R2024b, etc. So profiles must pin BOTH
# the SDK pkg version AND the corresponding MATLAB release.
#
# Detection inputs (see driver.py detect_installed):
#   - which matlab              (PATH probe — primary signal)
#   - C:\Program Files\MATLAB\R2024a\bin\matlab.exe (Windows defaults)
#   - /usr/local/MATLAB/R2024a/bin/matlab            (Linux defaults)
#   - MATLAB_ROOT env var
#
# Version normalization: MATLAB releases like "R2024a" are NOT PEP 440
# compatible. The driver maps R<YYYY><a|b> ↔ matlabengine X.Y per
# MathWorks' published table:
#
#   R2025b → matlabengine 25.2
#   R2025a → matlabengine 25.1
#   R2024b → matlabengine 24.2
#   R2024a → matlabengine 24.1
#   R2023b → matlabengine 23.2
#   R2023a → matlabengine 9.14   (numbering changed)
#
# We use the matlabengine pkg version as the canonical solver_versions
# entry to keep the resolver code path identical to the other drivers.

driver: matlab
sdk_package: matlabengine

profiles:

  - name: matlab_R2025b_engine_25_2
    sdk: ">=25.2,<25.3"
    solver_versions: ["R2025b", "25.2"]
    active_sdk_layer: "25.2"
    notes: |
      MATLAB R2025b + matlabengine 25.2.x. Latest tested — validated live
      on Windows with a persistent session (launch/run/disconnect).

  - name: matlab_R2025a_engine_25_1
    sdk: ">=25.1,<25.2"
    solver_versions: ["R2025a", "25.1"]
    active_sdk_layer: "25.1"
    notes: |
      MATLAB R2025a + matlabengine 25.1.x.

  - name: matlab_R2024b_engine_24_2
    sdk: ">=24.2,<24.3"
    solver_versions: ["R2024b", "24.2"]
    active_sdk_layer: "24.2"
    notes: |
      MATLAB R2024b + matlabengine 24.2.x.

  - name: matlab_R2024a_engine_24_1
    sdk: ">=24.1,<24.2"
    solver_versions: ["R2024a", "24.1"]
    active_sdk_layer: "24.1"
    notes: |
      MATLAB R2024a + matlabengine 24.1.x. Most common stable combo.

  - name: matlab_R2023b_engine_23_2
    sdk: ">=23.2,<23.3"
    solver_versions: ["R2023b", "23.2"]
    active_sdk_layer: "23.2"
    notes: |
      MATLAB R2023b + matlabengine 23.2.x.
